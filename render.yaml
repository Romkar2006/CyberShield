services:
  - type: web
    name: cybershield-server
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: MONGODB_URI
        fromEnvVar: MONGODB_URI
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        fromEnvVar: JWT_SECRET
      - key: ADMIN_PASSWORD
        fromEnvVar: ADMIN_PASSWORD
      - key: CLIENT_URL
        fromEnvVar: CLIENT_URL
      - key: HF_API_TOKEN
        fromEnvVar: HF_API_TOKEN
      - key: HF_MODEL_ID
        value: HuggingFaceH4/zephyr-7b-beta
      - key: GMAIL_USER
        fromEnvVar: GMAIL_USER
      - key: GMAIL_PASS
        fromEnvVar: GMAIL_PASS
      - key: ADMIN_EMAIL
        fromEnvVar: ADMIN_EMAIL
      - key: GEMINI_API_KEY
        fromEnvVar: GEMINI_API_KEY
      - key: CLOUDINARY_CLOUD_NAME
        fromEnvVar: CLOUDINARY_CLOUD_NAME
      - key: CLOUDINARY_API_KEY
        fromEnvVar: CLOUDINARY_API_KEY
      - key: CLOUDINARY_API_SECRET
        fromEnvVar: CLOUDINARY_API_SECRET
